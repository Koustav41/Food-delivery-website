<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#ff6b35">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="CraveBite">
    <link rel="apple-touch-icon" href="img/icon-192.png">
    <title>View Orders - Admin Dashboard - CraveBite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" type="jpg" href="img/Cravebite logo(new1) (2).png">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .admin-sidebar {
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            height: fit-content;
        }

        .admin-sidebar ul {
            list-style: none;
        }

        .admin-sidebar li {
            margin-bottom: 1rem;
        }

        .admin-sidebar a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .admin-sidebar a:hover,
        .admin-sidebar a.active {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .admin-content {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

<body>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-burger"></i> CraveBite <span
                    style="font-size: 1rem; color: var(--text-secondary);">Admin</span>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Back to Site</a></li>
                    <li><a href="admin-login.html" onclick="handleAdminLogout(event)">Logout</a></li>
                    <li>
                        <button id="theme-toggle" class="theme-btn" type="button" aria-label="Toggle theme">
                            <i class="fas fa-sun"></i>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="admin-container">
            <div class="admin-sidebar">
                <ul>
                    <li><a href="admin.html"><i class="fa-solid fa-utensils"></i> Manage Menu</a></li>
                    <li><a href="orders.html" class="active"><i class="fa-solid fa-receipt"></i> View Orders</a></li>
                </ul>
            </div>
            <div class="admin-content animate-fade-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0;">Customer Orders</h2>
                    <button type="button"
                        onclick="if(confirm('Clear all order history?')) { localStorage.removeItem('cravebite_orders'); renderAdminOrders(); }"
                        class="btn" style="background: #dc3545; padding: 0.5rem 1rem;">Clear History</button>
                </div>
                
                <div id="admin-orders-list">
                    <!-- Admin orders will be rendered here -->
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
    <script>
        // Check if admin is logged in
        const adminData = localStorage.getItem('cravebite_admin');
        if (!adminData && window.location.pathname.endsWith('orders.html')) {
            window.location.href = 'admin-login.html';
        }

        // Render orders when page loads
        document.addEventListener('DOMContentLoaded', () => {
            renderAdminOrders();
        });

        // Listen for changes in localStorage from other tabs
        window.addEventListener('storage', (event) => {
            if (event.key === 'cravebite_orders') {
                renderAdminOrders();
            }
        });
    </script>
</body>

</html>
